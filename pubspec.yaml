name: unofficial_chzzk_android_tv
description: "UnOfficial Chzzk for Android TV"
publish_to: "none"
version: 0.4.2+1

environment:
  sdk: ^3.12.2

dependencies:
  bloc: ^9.2.1
  bloc_concurrency: ^0.3.0
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_hooks: ^0.21.3+1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  hangul: ^0.7.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  retrofit: ^4.9.2
  uuid: ^4.5.3
  video_player: ^2.11.1
  wakelock_plus: ^1.6.1
  webview_flutter: ^4.13.1
  web_socket_channel: ^3.0.3
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_lint: ^0.4.1
  freezed: 3.2.5
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  retrofit_generator: ^10.2.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

    - family: KCC-Hanbit
      fonts:
        - asset: assets/fonts/KCC-Hanbit.otf
          weight: 400
